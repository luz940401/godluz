<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍與地下城 — 官方公告</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav id="navbar">
    <div class="nav-inner">
      <div class="nav-logo">
        <span class="nav-logo-icon">⚔</span>
        <span class="nav-logo-text">D&amp;D 官方公告</span>
      </div>
      <ul class="nav-links">
        <li><a href="#announcements">公告</a></li>
        <li><a href="#characters">英雄名錄</a></li>
        <li><a href="#orders">騎士團</a></li>
      </ul>
    </div>
  </nav>

  <header id="hero">
    <canvas id="particles-canvas"></canvas>
    <div class="hero-vignette"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">官方公告網站</p>
      <div class="hero-ornament">
        <svg width="320" height="20" viewBox="0 0 320 20" fill="none">
          <line x1="0" y1="10" x2="148" y2="10" stroke="#8b6914" stroke-width="0.8" opacity="0.7"/>
          <rect x="151" y="3" width="10" height="10" transform="rotate(45 156 8)" fill="none" stroke="#c9a84c" stroke-width="1"/>
          <rect x="154" y="6" width="4" height="4" transform="rotate(45 156 8)" fill="#c9a84c" opacity="0.6"/>
          <line x1="164" y1="10" x2="320" y2="10" stroke="#8b6914" stroke-width="0.8" opacity="0.7"/>
        </svg>
      </div>
      <h1 class="hero-title">
        <span class="hero-title-line">DUNGEONS</span>
        <span class="hero-title-amp">&amp;</span>
        <span class="hero-title-line">DRAGONS</span>
      </h1>
      <div class="hero-ornament">
        <svg width="320" height="20" viewBox="0 0 320 20" fill="none">
          <line x1="0" y1="10" x2="148" y2="10" stroke="#8b6914" stroke-width="0.8" opacity="0.7"/>
          <rect x="151" y="3" width="10" height="10" transform="rotate(45 156 8)" fill="none" stroke="#c9a84c" stroke-width="1"/>
          <rect x="154" y="6" width="4" height="4" transform="rotate(45 156 8)" fill="#c9a84c" opacity="0.6"/>
          <line x1="164" y1="10" x2="320" y2="10" stroke="#8b6914" stroke-width="0.8" opacity="0.7"/>
        </svg>
      </div>
      <p class="hero-subtitle" id="hero-subtitle"></p>
    </div>
    <div class="hero-scroll-hint">
      <span>向下探索</span>
      <div class="scroll-arrow"></div>
    </div>
  </header>

  <main>
    <section id="announcements" class="section">
      <div class="section-header">
        <div class="section-divider"></div>
        <h2 class="section-title">官方公告</h2>
        <div class="section-divider right"></div>
      </div>
      <div class="announcements-grid" id="announcements-grid"></div>
    </section>

    <section id="characters" class="section section-alt">
      <div class="section-header">
        <div class="section-divider"></div>
        <h2 class="section-title">英雄名錄</h2>
        <div class="section-divider right"></div>
      </div>
      <div class="characters-grid" id="characters-grid"></div>
    </section>

    <section id="orders" class="section">
      <div class="section-header">
        <div class="section-divider"></div>
        <h2 class="section-title">騎士團</h2>
        <div class="section-divider right"></div>
      </div>
      <div class="orders-list" id="orders-list"></div>
    </section>
  </main>

  <footer id="footer">
    <div class="footer-sigil">⚔</div>
    <p class="footer-tagline" id="footer-tagline"></p>
    <div class="footer-divider"></div>
    <p class="footer-copy" id="footer-copy"></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
