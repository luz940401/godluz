<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍與地下城 — 官方公告</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav id="navbar">
    <div class="nav-inner">
      <div class="nav-logo">
        <span class="nav-logo-icon">⚔</span>
        <span class="nav-logo-text">D&amp;D 官方公告</span>
      </div>
      <ul class="nav-links" id="nav-links">
        <li><a href="#announcements" onclick="closeNav()">公告</a></li>
        <li><a href="#worldmap" onclick="closeNav()">世界地圖</a></li>
        <li><a href="#patchnotes" onclick="closeNav()">改版資訊</a></li>
        <li><a href="#characters" onclick="closeNav()">英雄名錄</a></li>
        <li><a href="#orders" onclick="closeNav()">騎士團</a></li>
        <li><a href="#clues" onclick="closeNav()">線索清單</a></li>
      </ul>
      <button class="nav-hamburger" id="hamburger" onclick="toggleNav()" aria-label="選單">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <header id="hero">
    <canvas id="particles-canvas"></canvas>
    <div class="hero-vignette"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">官方公告網站</p>
      <div class="hero-ornament">
        <svg width="320" height="20" viewBox="0 0 320 20" fill="none">
          <line x1="0" y1="10" x2="148" y2="10" stroke="#8b6914" stroke-width="0.8" opacity="0.7"/>
          <rect x="151" y="3" width="10" height="10" transform="rotate(45 156 8)" fill="none" stroke="#c9a84c" stroke-width="1"/>
          <rect x="154" y="6" width="4" height="4" transform="rotate(45 156 8)" fill="#c9a84c" opacity="0.6"/>
          <line x1="164" y1="10" x2="320" y2="10" stroke="#8b6914" stroke-width="0.8" opacity="0.7"/>
        </svg>
      </div>
      <h1 class="hero-title">
        <span class="hero-title-line">DUNGEONS</span>
        <span class="hero-title-amp">&amp;</span>
        <span class="hero-title-line">DRAGONS</span>
      </h1>
      <div class="hero-ornament">
        <svg width="320" height="20" viewBox="0 0 320 20" fill="none">
          <line x1="0" y1="10" x2="148" y2="10" stroke="#8b6914" stroke-width="0.8" opacity="0.7"/>
          <rect x="151" y="3" width="10" height="10" transform="rotate(45 156 8)" fill="none" stroke="#c9a84c" stroke-width="1"/>
          <rect x="154" y="6" width="4" height="4" transform="rotate(45 156 8)" fill="#c9a84c" opacity="0.6"/>
          <line x1="164" y1="10" x2="320" y2="10" stroke="#8b6914" stroke-width="0.8" opacity="0.7"/>
        </svg>
      </div>
      <p class="hero-subtitle" id="hero-subtitle"></p>
    </div>
    <div class="hero-scroll-hint">
      <span>向下探索</span>
      <div class="scroll-arrow"></div>
    </div>
  </header>

  <main>

    <!-- 公告 -->
    <section id="announcements" class="section">
      <div class="section-header">
        <div class="section-divider"></div>
        <h2 class="section-title">官方公告</h2>
        <div class="section-divider right"></div>
      </div>
      <div class="announcements-grid" id="announcements-grid"></div>
    </section>

    <!-- 世界地圖 -->
    <section id="worldmap" class="section section-alt">
      <div class="section-header">
        <div class="section-divider"></div>
        <h2 class="section-title">世界地圖</h2>
        <div class="section-divider right"></div>
      </div>
      <div id="map-container"></div>
    </section>

    <!-- 改版資訊 -->
    <section id="patchnotes" class="section">
      <div class="section-header">
        <div class="section-divider"></div>
        <h2 class="section-title">改版資訊</h2>
        <div class="section-divider right"></div>
      </div>
      <div class="patchnotes-list" id="patchnotes-list"></div>
    </section>

    <!-- 英雄名錄 -->
    <section id="characters" class="section section-alt">
      <div class="section-header">
        <div class="section-divider"></div>
        <h2 class="section-title">英雄名錄</h2>
        <div class="section-divider right"></div>
      </div>
      <div class="characters-grid" id="characters-grid"></div>
    </section>

    <!-- 騎士團 -->
    <section id="orders" class="section">
      <div class="section-header">
        <div class="section-divider"></div>
        <h2 class="section-title">騎士團</h2>
        <div class="section-divider right"></div>
      </div>
      <div class="orders-ranked" id="orders-list"></div>
    </section>

    <!-- 線索清單 -->
    <section id="clues" class="section section-clues">
      <div class="section-header">
        <div class="section-divider"></div>
        <h2 class="section-title">線索清單</h2>
        <div class="section-divider right"></div>
      </div>
      <div class="clues-grid" id="clues-grid"></div>
    </section>

  </main>

  <footer id="footer">
    <div class="footer-sigil">⚔</div>
    <p class="footer-tagline" id="footer-tagline"></p>
    <div class="footer-divider"></div>
    <p class="footer-copy" id="footer-copy"></p>
  </footer>

  <!-- Detail Panel -->
  <div id="detail-overlay" onclick="handleDetailOverlayClick(event)">
    <div class="detail-panel">
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- Map Lightbox -->
  <div id="map-lightbox" onclick="closeMapLightbox()">
    <button class="lightbox-close" onclick="event.stopPropagation();closeMapLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="大陸地圖">
  </div>

  <script src="app.js"></script>
</body>
</html>
